name: mellivora_english_app
description: 像听音乐一样学英语 — Flutter 跨平台 APP
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # 音频播放
  just_audio: ^0.9.40
  audio_service: ^0.18.13

  # 本地数据库 (Drift / SQLite)
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.0.0

  # 登录
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2

  # 网络
  dio: ^5.4.3+1

  # 环境变量
  flutter_dotenv: ^5.1.0

  # 文件选择
  file_picker: ^8.0.0+1

  # 工具
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  receive_sharing_intent: ^1.8.0
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.16.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/icons/
    - .env
